apiVersion: apps/v1
kind: Deployment
metadata:
  name: acc-cypress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acc-cypress
  template:
    metadata:
      labels:
        app: acc-cypress
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: acc-cypress
          image: acc-cypress
          resources:
            requests:
              memory: 768Mi
              cpu: 250m
            limits:
              memory: 1024Mi
              cpu: 1000m
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: acc-ui-configmap
            - secretRef:
                name: acc-ui-secrets
          readinessProbe:
            httpGet:
              path: /api/health/version
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /api/health/version
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
